name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish, for example v0.1.0. Leave empty to build only."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and publish DMG
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release version
        shell: zsh {0}
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' app/Info.plist)"
          RELEASE_TAG=""

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          elif [[ -n "$INPUT_RELEASE_TAG" ]]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
          fi

          if [[ -n "$RELEASE_TAG" ]]; then
            TAG_VERSION="${RELEASE_TAG#v}"
            if [[ "$VERSION" != "$TAG_VERSION" ]]; then
              echo "Release tag $RELEASE_TAG does not match app version $VERSION" >&2
              exit 1
            fi
          fi

          echo "CLAMLESS_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Build release DMG
        run: make dmg

      - name: Verify DMG
        shell: zsh {0}
        run: |
          set -euo pipefail
          shasum -a 256 -c "dist/Clamless-$CLAMLESS_VERSION.dmg.sha256"
          hdiutil verify "dist/Clamless-$CLAMLESS_VERSION.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clamless-${{ env.CLAMLESS_VERSION }}
          path: |
            dist/Clamless-${{ env.CLAMLESS_VERSION }}.dmg
            dist/Clamless-${{ env.CLAMLESS_VERSION }}.dmg.sha256
          if-no-files-found: error

      - name: Prepare release notes
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "No release tag requested; skipping release notes."
            exit 0
          fi

          CHECKSUM="$(cut -d ' ' -f 1 "dist/Clamless-$CLAMLESS_VERSION.dmg.sha256")"
          NOTES="$RUNNER_TEMP/release-notes.md"

          cat > "$NOTES" <<NOTES
          Clamless $CLAMLESS_VERSION

          Apple Silicon macOS menu bar utility for disconnecting the built-in display while keeping the MacBook lid open.

          SHA-256:

          \`\`\`text
          $CHECKSUM
          \`\`\`

          Note: this build is ad-hoc signed but not Apple-notarized yet. On first launch, macOS may require right-clicking Clamless.app and choosing Open.
          NOTES

          echo "RELEASE_NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "No release tag requested; skipping GitHub Release publish."
            exit 0
          fi

          DMG="dist/Clamless-$CLAMLESS_VERSION.dmg"
          SUM="dist/Clamless-$CLAMLESS_VERSION.dmg.sha256"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Clamless $CLAMLESS_VERSION" \
              --notes-file "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" "$DMG" "$SUM" --clobber
          else
            gh release create "$RELEASE_TAG" "$DMG" "$SUM" \
              --title "Clamless $CLAMLESS_VERSION" \
              --notes-file "$RELEASE_NOTES"
          fi
